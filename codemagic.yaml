workflows:
  ios-release:
    name: Tranmere Tracker — iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_BUNDLE_ID: com.tranmererovers.tracker
        APP_STORE_CONNECT_KEY_IDENTIFIER: 5PX9NXN6BX
        APP_STORE_CONNECT_ISSUER_ID: edbead90-0e55-479d-9db9-ac1e7c5f21c1
        # APP_STORE_CONNECT_PRIVATE_KEY — add this in Codemagic > Environment Variables (secure)
        #   Value = full contents of the .p8 file
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Set up keychain and signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$APP_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Increment build number
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_BUNDLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $(($LATEST + 1))

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
