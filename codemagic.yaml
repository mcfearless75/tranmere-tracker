workflows:
  ios-release:
    name: Tranmere Tracker — iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        # Codemagic group containing APP_STORE_CONNECT_PRIVATE_KEY (the .p8 file contents).
        # Add the group in Codemagic UI: Environment variables → Add new group → name: appstore_credentials
        # Then add APP_STORE_CONNECT_PRIVATE_KEY (secure) to that group with the full .p8 file contents.
        - appstore_credentials
      vars:
        APP_BUNDLE_ID: com.tranmererovers.tracker
        APPLE_TEAM_ID: F55TGQ7TD3
        APP_STORE_CONNECT_KEY_IDENTIFIER: 5PX9NXN6BX
        APP_STORE_CONNECT_ISSUER_ID: edbead90-0e55-479d-9db9-ac1e7c5f21c1
      node: latest
      # Apple requires iOS 26 SDK (Xcode 26+) for all App Store uploads as of 2026.
      xcode: latest

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Set up keychain and signing
        script: |
          set -e
          keychain initialize

          # Reusable cert flow:
          # If IOS_DIST_PRIVATE_KEY is set in the env, write it to disk and reuse the
          # existing iOS Distribution cert in App Store Connect (no new cert per build).
          # Otherwise, generate a fresh key and create a new cert (one-off bootstrap).
          if [ -n "$IOS_DIST_PRIVATE_KEY" ]; then
            echo "=== Using stored IOS_DIST_PRIVATE_KEY (reusing existing cert) ==="
            printf "%s" "$IOS_DIST_PRIVATE_KEY" > /tmp/dist_cert_key.pem
          else
            echo "=== No stored private key — generating fresh and creating new cert ==="
            openssl genrsa -out /tmp/dist_cert_key.pem 2048
            app-store-connect certificates create \
              --type IOS_DISTRIBUTION \
              --certificate-key=@file:/tmp/dist_cert_key.pem \
              --save
            echo ""
            echo "============================================================"
            echo "ONE-TIME ACTION: Save this private key to Codemagic env vars"
            echo "as IOS_DIST_PRIVATE_KEY (group: appstore_credentials, secure)"
            echo "so future builds reuse this cert instead of creating a new one."
            echo "----- BEGIN private key (copy ALL of this incl. headers) -----"
            cat /tmp/dist_cert_key.pem
            echo "----- END private key -----"
            echo "============================================================"
          fi

          echo "=== Fetching signing files for $APP_BUNDLE_ID ==="
          app-store-connect fetch-signing-files "$APP_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_cert_key.pem \
            --create

          echo "=== Adding certificates to keychain ==="
          keychain add-certificates

          echo "=== Applying profiles to project ==="
          xcode-project use-profiles \
            --project ios/App/App.xcodeproj \
            --warn-only

      - name: Increment build number
        script: |
          cd ios/App
          # get-latest-build-number covers TestFlight + App Store (not just released
          # versions), so it sees prior uploads the app-store-only query misses.
          LATEST=$(app-store-connect get-latest-build-number "$APP_BUNDLE_ID" 2>/dev/null || echo 0)
          # Codemagic's BUILD_NUMBER is monotonic per workflow — use whichever is higher.
          BASE=${LATEST:-0}
          if [ "${BUILD_NUMBER:-0}" -gt "$BASE" ]; then BASE=$BUILD_NUMBER; fi
          agvtool new-version -all $(($BASE + 1))

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --archive-flags="DEVELOPMENT_TEAM=$APPLE_TEAM_ID CODE_SIGN_STYLE=Manual"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Tranmere Tracker — Android Release
    max_build_duration: 60
    # mac_mini_m2 matches the iOS workflow / current billing plan.
    # linux_x2 requires a paid plan that isn't active. Android builds fine on macOS.
    instance_type: mac_mini_m2

    environment:
      # Create a group in Codemagic UI: Environment variables → Add new group → name: android_credentials
      # Add these variables to that group (all secure):
      #   CM_KEYSTORE        — base64-encoded .jks or .keystore file
      #                        Generate: keytool -genkeypair -v -keystore tranmere.keystore -alias tranmere -keyalg RSA -keysize 2048 -validity 10000
      #                        Encode:   base64 -w 0 tranmere.keystore  (Linux/Mac)
      #   CM_KEYSTORE_PASSWORD — keystore password you set above
      #   CM_KEY_ALIAS         — alias you used above (e.g. tranmere)
      #   CM_KEY_PASSWORD      — key password (can be same as keystore password)
      #   GCLOUD_SERVICE_ACCOUNT_CREDENTIALS — full JSON from Google Play Console
      #     Play Console → Setup → API access → Link to Google Cloud → Create service account
      #     Grant the service account "Release Manager" role in Play Console
      groups:
        - android_credentials
      vars:
        PACKAGE_NAME: com.tranmererovers.tracker
      node: latest
      java: 17

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Sync Capacitor Android
        script: |
          # assets dir is gitignored but cap sync needs it to exist first
          mkdir -p android/app/src/main/assets
          npx cap sync android

      - name: Decode keystore
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > /tmp/tranmere.keystore

      - name: Build release AAB
        script: |
          # @capacitor-community/background-geolocation@1.2.x references the deprecated
          # proguard-android.txt in its build.gradle (inside node_modules). Gradle 10 /
          # AGP 8+ reject this. Patch the file in node_modules before Gradle evaluates it.
          PLUGIN_GRADLE="node_modules/@capacitor-community/background-geolocation/android/build.gradle"
          if [ -f "$PLUGIN_GRADLE" ]; then
            sed -i '' 's/proguard-android\.txt/proguard-android-optimize.txt/g' "$PLUGIN_GRADLE"
            echo "Patched $PLUGIN_GRADLE"
          else
            echo "WARNING: $PLUGIN_GRADLE not found — skipping patch"
          fi
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/tranmere.keystore \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab

    # Manual upload for the first release: download the .aab artifact above and
    # upload it to Play Console → Internal testing by hand. Once a Google Play
    # service account is configured (GCLOUD_SERVICE_ACCOUNT_CREDENTIALS in the
    # android_credentials group), re-enable the block below for auto-publish.
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
