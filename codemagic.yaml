workflows:
  ios-release:
    name: Tranmere Tracker — iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        # Codemagic group containing APP_STORE_CONNECT_PRIVATE_KEY (the .p8 file contents).
        # Add the group in Codemagic UI: Environment variables → Add new group → name: appstore_credentials
        # Then add APP_STORE_CONNECT_PRIVATE_KEY (secure) to that group with the full .p8 file contents.
        - appstore_credentials
      vars:
        APP_BUNDLE_ID: com.tranmererovers.tracker
        APPLE_TEAM_ID: F55TGQ7TD3
        APP_STORE_CONNECT_KEY_IDENTIFIER: 5PX9NXN6BX
        APP_STORE_CONNECT_ISSUER_ID: edbead90-0e55-479d-9db9-ac1e7c5f21c1
      node: latest
      xcode: 16.3

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Set up keychain and signing
        script: |
          set -e
          keychain initialize

          echo "=== Generating fresh RSA private key for distribution cert ==="
          openssl genrsa -out /tmp/dist_cert_key.pem 2048

          echo "=== Listing existing iOS Distribution certificates ==="
          app-store-connect certificates list --type IOS_DISTRIBUTION --json > /tmp/certs.json || echo "[]" > /tmp/certs.json
          CERT_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/certs.json'))))")
          echo "Found $CERT_COUNT existing IOS_DISTRIBUTION certificate(s)"

          echo "=== Creating new iOS Distribution certificate (with private key) ==="
          # Apple allows max 2 IOS_DISTRIBUTION certs per team. If you hit the limit,
          # revoke unused ones in https://developer.apple.com/account/resources/certificates/list
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:/tmp/dist_cert_key.pem \
            --save

          echo "=== Fetching signing files for $APP_BUNDLE_ID ==="
          app-store-connect fetch-signing-files "$APP_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose

          echo "=== Provisioning profiles fetched ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || echo "NO PROFILES DIRECTORY"

          echo "=== Adding certificates to keychain ==="
          keychain add-certificates

          echo "=== Applying profiles to project ==="
          xcode-project use-profiles \
            --project ios/App/App.xcodeproj \
            --warn-only

          echo "=== Verify pbxproj signing settings after use-profiles ==="
          grep -E "PROVISIONING_PROFILE_SPECIFIER|CODE_SIGN_STYLE|DEVELOPMENT_TEAM|CODE_SIGN_IDENTITY" ios/App/App.xcodeproj/project.pbxproj || echo "NONE FOUND"

      - name: Increment build number
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_BUNDLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $(($LATEST + 1))

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --archive-flags="DEVELOPMENT_TEAM=$APPLE_TEAM_ID CODE_SIGN_STYLE=Manual"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
